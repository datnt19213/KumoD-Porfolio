<div class="admin-container">
    {{#if !isLoggedIn}}
    <div class="admin-card login-card">
        <h2>Admin Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Token</label>
                <input type="password" id="githubToken" placeholder="Your token" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <div class="form-actions">
                <button type="button" class="btn ghost" id="clearSessionBtn">Clear Session</button>
                <button type="submit" class="btn primary">Login</button>
            </div>
        </form>
    </div>
    {{/if}}

    {{#if isLoggedIn}}
    <div class="admin-header">
        <h1>Admin Dashboard</h1>
        <div class="header-actions">
            <button id="logoutBtn" class="btn secondary">Logout</button>
        </div>
    </div>

    <div id="statusMessage" class="status-message"></div>

    <div class="admin-grid">
        <!-- Project List -->
        <div class="admin-card list-card">
            <div class="card-header">
                <h3>Projects</h3>
                <button id="addNewBtn" class="btn primary">Add New</button>
            </div>
            <div id="projectAdminList" class="project-admin-list">
                <!-- Projects rendered here -->
            </div>
        </div>

        <!-- Project Editor Form -->
        <div id="editorCard" class="admin-card editor-card" style="display: none;">
            <div class="card-header">
                <h3 id="editorTitle">Edit Project</h3>
                <button id="closeEditorBtn" class="btn secondary">Close</button>
            </div>
            <form id="projectForm">
                <input type="hidden" id="editId">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="pTitle" required>
                    </div>
                    <div class="form-group">
                        <label>Slug</label>
                        <input type="text" id="pSlug" required>
                    </div>
                    <div class="form-group">
                        <label>Thumbnail URL</label>
                        <input type="text" id="pThumbnail">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <input type="text" id="pCategory">
                    </div>
                </div>
                <div class="form-group">
                    <label>Short Description</label>
                    <input type="text" id="pShortDesc">
                </div>
                <div class="form-group">
                    <label>Full Description</label>
                    <textarea id="pDesc"></textarea>
                </div>
                <div class="form-group checkbox">
                    <label><input type="checkbox" id="pFeatured"> Featured Project</label>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn primary">Save Project</button>
                </div>
            </form>
        </div>
    </div>
    {{/if}}
</div>
