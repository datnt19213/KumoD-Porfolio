<div class="admin-container">
    {{#if !isLoggedIn}}
    <div class="admin-card login-card card-lie fade">
        <h2>Admin Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Token</label>
                <input type="password" id="githubToken" placeholder="Your token" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <div class="form-actions">
                <button type="button" class="btn ghost" id="clearSessionBtn">Clear Session</button>
                <button type="submit" class="btn primary">Login</button>
            </div>
        </form>
    </div>
    {{/if}}

    {{#if isLoggedIn}}
    <div class="admin-header fade-up">
        <h1>Admin Dashboard</h1>
        <div class="header-actions">
            <button id="logoutBtn" class="btn secondary">Logout</button>
        </div>
    </div>

    <div id="statusMessage" class="status-message"></div>

    <div class="admin-grid">
        <!-- Project List -->
        <div class="admin-card list-card fade-right">
            <div class="card-header">
                <h3>Projects</h3>
                <button id="addNewBtn" class="btn primary">Add New</button>
            </div>
            <div id="projectAdminList" class="project-admin-list">
                <!-- Projects rendered here -->
            </div>
        </div>

        <!-- Project Editor Form -->
        <div id="editorCard" class="admin-card editor-card" style="display: none;">
            <div class="card-header">
                <h3 id="editorTitle">Edit Project</h3>
                
            </div>
            <form id="projectForm">
                <input type="hidden" id="editId">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="pTitle" required>
                    </div>
                    <div class="form-group">
                        <label>Slug</label>
                        <input type="text" id="pSlug" required>
                    </div>
                    <div class="form-group">
                        <label>Thumbnail URL</label>
                        <input type="text" id="pThumbnail">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <input type="text" id="pCategory">
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select class="select-status" id="pStatus">
                            <option value="completed">Completed</option>
                            <option value="in-progress">In Progress</option>
                            <option value="planned">Planned</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Featured</label>
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="pFeatured">
                            <label for="pFeatured">Is Featured</label>
                        </div>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Start Date</label>
                        <input type="date" id="pStartDate">
                    </div>
                    <div class="form-group">
                        <label>End Date</label>
                        <input type="date" id="pEndDate">
                    </div>
                    <div class="form-group">
                        <label>Live URL</label>
                        <input type="text" id="pLiveUrl">
                    </div>
                    <div class="form-group">
                        <label>Repo URL</label>
                        <input type="text" id="pRepoUrl">
                    </div>
                </div>

                <div class="form-group">
                    <label>Short Description</label>
                    <input type="text" id="pShortDesc">
                </div>
                <div class="form-group">
                    <label>Full Description (Markdown supported)</label>
                    <textarea id="pDesc" rows="4"></textarea>
                </div>

                <div class="form-group">
                    <label>Images (URL, one per line)</label>
                    <textarea id="pImages" placeholder="https://example.com/img1.jpg&#10;https://example.com/img2.jpg"></textarea>
                </div>

                <div class="form-group">
                    <label>Video URL</label>
                    <input type="text" id="pVideo">
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Technologies (Comma separated)</label>
                        <input type="text" id="pTechnologies" placeholder="React, Node.js, ...">
                    </div>
                    <div class="form-group">
                        <label>Frameworks (Comma separated)</label>
                        <input type="text" id="pFrameworks" placeholder="Next.js, TailwindCSS, ...">
                    </div>
                    <div class="form-group">
                        <label>Tools (Comma separated)</label>
                        <input type="text" id="pTools" placeholder="Figma, Docker, ...">
                    </div>
                    <div class="form-group">
                        <label>Tags (Comma separated)</label>
                        <input type="text" id="pTags" placeholder="Web, CMS, ...">
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Meta Title</label>
                        <input type="text" id="pMetaTitle">
                    </div>
                    <div class="form-group">
                        <label>Meta Description</label>
                        <input type="text" id="pMetaDescription">
                    </div>
                    <div class="form-group">
                        <label>OG Image</label>
                        <input type="text" id="pOgImage">
                    </div>
                </div>

                <div class="form-actions">
                    <button id="closeEditorBtn" class="btn secondary">Close</button>
                    <button type="submit" class="btn primary">Save Project</button>
                </div>
            </form>
        </div>
    </div>
    {{/if}}
</div>
