<div class="detail">

    <h1>{{title}}</h1>

    <img class="hero" src="{{thumbnail}}">

    <p>{{description}}</p>

    <h3>Technologies</h3>

    <div class="tags">

        {{#array technologies}}

        <span class="tag">{{value}}</span>

        {{/array}}

    </div>

    <h3 style="margin-top:30px">Gallery</h3>

    <div class="gallery">

        {{#array images}}

        <img src="{{value}}">

        {{/array}}

    </div>

    <div style="margin-top:30px">

        {{#if liveUrl}}
        <a class="btn" href="{{liveUrl}}" target="_blank">Live Demo</a>
        {{/if}}

        {{#if repoUrl}}
        <a class="btn" href="{{repoUrl}}" target="_blank">Source Code</a>
        {{/if}}

    </div>

</div>
