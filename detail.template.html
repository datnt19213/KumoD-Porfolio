<div class="max-w-5xl mx-auto! pt-32 pb-20 px-6! sm:px-10!">

    <!-- Back Button -->
    <a class="inline-flex items-center gap-2 text-[11px] font-bold uppercase tracking-widest text-slate-500 hover:text-white no-underline transition-all duration-300 mb-12! group" href="javascript:history.back()">
        <svg class="w-3 h-3 transition-transform duration-300 group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
        </svg>
        Back to projects
    </a>

    <div class="space-y-12!">
        <header class="space-y-6! relative">
            <h1 class="text-4xl sm:text-5xl lg:text-6xl font-bold leading-tight text-white tracking-tight">{{title}}</h1>
            <span class="absolute top-4 right-4 border border-white/5 uppercase rounded-full px-2! py-1! text-sm">{{status}}</span>
            <div class="flex flex-wrap gap-2">
                {{#array technologies}}
                <span class="text-[10px] font-bold py-1! px-3! bg-white/5 text-slate-400 rounded border border-white/5 uppercase tracking-tighter">{{value}}</span>
                {{/array}}
            </div>
        </header>

        <div class="aspect-video w-full rounded-2xl overflow-hidden border border-white/5 shadow-2xl">
            <img class="w-full h-full object-cover" src="{{thumbnail}}">
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-[1fr_300px] gap-16">
            <div class="space-y-8!">
                <div class="prose prose-invert max-w-none">
                    <p class="leading-[1.8] text-slate-400 text-lg font-light">{{description}}</p>
                </div>

                <div class="space-y-6! pt-8! border-t border-white/5">
                    <h3 class="text-sm font-bold uppercase tracking-widest text-white">Project Gallery</h3>
                    <div class="grid gap-6">
                        {{#array images}}
                        <img class="w-full rounded-xl border border-white/5 hover:border-white/10 transition-all duration-500" src="{{value}}">
                        {{/array}}
                    </div>
                </div>
            </div>

            <aside class="space-y-10!">
                <div class="space-y-4!">
                    <h3 class="text-sm font-bold uppercase tracking-widest text-white">Links</h3>
                    <div class="flex flex-col gap-3">
                        {{#if liveUrl}}
                        <a class="inline-flex items-center justify-center gap-2 py-3.5! px-6! rounded-full text-xs font-bold uppercase tracking-widest bg-white text-black no-underline hover:bg-slate-200 transition-all duration-300" href="{{liveUrl}}" target="_blank">
                            Live Demo
                        </a>
                        {{/if}}

                        {{#if repoUrl}}
                        <a class="inline-flex items-center justify-center gap-2 py-3.5! px-6! rounded-full text-xs font-bold uppercase tracking-widest bg-white/5 border border-white/10 text-white no-underline hover:bg-white/10 transition-all duration-300" href="{{repoUrl}}" target="_blank">
                            Source Code
                        </a>
                        {{/if}}
                    </div>
                </div>
            </aside>
        </div>
    </div>

</div>
