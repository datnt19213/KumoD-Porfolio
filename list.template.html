<div class="container" id="projects">

    <h2 class="section-title">Featured</h2>

    <div class="project-grid">

        {{#each featuredProjects}}

        <div class="card">

            <img src="{{thumbnail}}">

            <div class="card-body">

                <div class="card-title">{{title}}</div>

                <div class="card-desc">{{shortDescription}}</div>

                <div class="tags">

                    {{#array technologies}}

                    <span class="tag">{{value}}</span>

                    {{/array}}

                </div>

                <a class="btn" href="?slug={{slug}}">View Project</a>

            </div>

        </div>

        {{/each}}

    </div>



    <h2 class="section-title" style="margin-top:60px">All Projects</h2>

    <div class="project-grid">

        {{#each projects}}

        <div class="card">

            <img src="{{thumbnail}}">

            <div class="card-body">

                <div class="card-title">{{title}}</div>

                <div class="card-desc">{{shortDescription}}</div>

                <div class="tags">

                    {{#array technologies}}

                    <span class="tag">{{value}}</span>

                    {{/array}}

                </div>

                <a class="btn" href="?slug={{slug}}">View Project</a>

            </div>

        </div>

        {{/each}}

    </div>

</div>
