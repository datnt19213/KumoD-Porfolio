<div class="container" id="projects">

    <!-- My profile porttfolio -->
    <div class="container-sm profile bg-blur">
        <div class="img-lg">
            <img src="https://lh3.googleusercontent.com/d/11drXx6lUAWaPxzS1qdVlSk5EvRXAZcpH" alt="Profile">
        </div>
        <div class="container-md">
            <div class="card-title">Nguyễn Thành Đạt</div>
            <div class="card-desc">Frontend Developer</div>
        </div>
    </div>

    <h2 class="section-title">Featured</h2>

    <div class="project-grid">

        {{#each featuredProjects}}

        <div class="card fade-up">

            <a class="card-link" href="?slug={{slug}}">

                <img src="{{thumbnail}}">
            </a>

            <div class="card-body">

                <div class="card-title"><a class="card-link" href="?slug={{slug}}">
                        {{title}}
                    </a></div>

                <div class="card-desc">{{shortDescription}}</div>

                <div class="tags">

                    {{#array technologies}}

                    <span class="tag">{{value}}</span>

                    {{/array}}

                </div>

            </div>

        </div>

        {{/each}}

    </div>



    <h2 class="section-title" style="margin-top:60px">All Projects</h2>

    <div class="project-grid">

        {{#each projects}}

        <div class="card fade-up">
            <a class="card-link" href="?slug={{slug}}">
                <img src="{{thumbnail}}">
            </a>
            <div class="card-body">

                <div class="card-title"><a class="card-link" href="?slug={{slug}}">
                        {{title}}
                    </a></div>

                <div class="card-desc">{{shortDescription}}</div>

                <div class="tags">

                    {{#array technologies}}

                    <span class="tag">{{value}}</span>

                    {{/array}}

                </div>

            </div>

        </div>

        {{/each}}

    </div>

</div>
